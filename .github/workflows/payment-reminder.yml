# Pemicu luar untuk reminder pembayaran abandoned.
# Vercel Hobby cron hanya sekali/hari, jadi kita guna GitHub Actions tiap ~30 min
# untuk hit endpoint cron. Endpoint dilindungi oleh CRON_SECRET (Bearer).
#
# SETUP (sekali sahaja):
#   Repo → Settings → Secrets and variables → Actions → New repository secret
#     Name:  CRON_SECRET   (nilai sama macam env CRON_SECRET di Vercel)
#
# Nota: jadual GitHub Actions "best-effort" — kadang lewat 5–15 min. OK untuk
# reminder. Boleh trigger manual via tab Actions (workflow_dispatch).

name: Payment Reminder

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit payment-reminder cron
        run: |
          code=$(curl -s -o /tmp/out.txt -w "%{http_code}" \
            -X GET "https://shop.syababfresh.my/api/cron/payment-reminder" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP $code"; cat /tmp/out.txt
          test "$code" = "200"
